name: Quality Gate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  issues: read
  checks: write
  pull-requests: write

env:
  DEEP_CLEAN: 'true'

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          clean: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13.3'

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: Run linter and unit tests in backend
        working-directory: ./backend
        run: |
          uv sync
          uv run ruff check .
          uv run pytest --junitxml=pytest-results.xml

      - uses: EnricoMi/publish-unit-test-result-action/linux@v2
        if: always()
        with:
          check_name: "Backend Unit Tests"
          files: backend/pytest-results.xml

      - name: Run linter and unit tests in frontend
        working-directory: ./frontend
        run: |
          uv sync
          uv run ruff check .
          uv run pytest --junitxml=pytest-results.xml

      - uses: EnricoMi/publish-unit-test-result-action/linux@v2
        if: always()
        with:
          check_name: "Frontend Unit Tests"
          files: frontend/pytest-results.xml

      - name: Test Buddy
        run: |
          ./buddy.sh start
          ./buddy.sh test

      - name: Publish Playwright Test Results
        uses: EnricoMi/publish-unit-test-result-action/linux@v2
        if: always()
        with:
          check_name: "Playwright UI Tests"
          files: ./tests/e2e/test-results/results.xml

      - name: Archive Playwright Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report.zip
          path: ./tests/e2e/test-results
          retention-days: 7
